name: brew pr-pull

on:
  pull_request_target:
    types:
      - labeled

jobs:
  pr-pull:
    if: >-
      github.event.label.name == 'pr-pull'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency: pr-pull-${{ github.event.pull_request.number }}
    permissions:
      actions: read
      checks: read
      contents: write
      issues: read
      pull-requests: write
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ github.token }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main

      - name: Pull bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
          PULL_REQUEST: ${{ github.event.pull_request.number }}
        run: brew pr-pull --debug --tap="$GITHUB_REPOSITORY" "$PULL_REQUEST"

      - name: Merge PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PULL_REQUEST: ${{ github.event.pull_request.number }}
        run: |
          git push origin HEAD:refs/heads/"$PR_BRANCH" --force
          gh pr merge "$PULL_REQUEST" --squash --delete-branch --match-head-commit "$(git rev-parse HEAD)"
