name: Auto pr-pull

on:
  workflow_run:
    workflows: ["brew test-bot"]
    types: [completed]

concurrency:
  group: auto-pr-pull-${{ github.event.workflow_run.head_branch }}

jobs:
  auto-label:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'update-jmxsh-') &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Apply pr-pull label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            const prs = context.payload.workflow_run.pull_requests;
            let prNumber;

            if (prs && prs.length > 0) {
              prNumber = prs[0].number;
            } else {
              // Fallback: find PR by branch name
              const branch = context.payload.workflow_run.head_branch;
              const result = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${branch}`,
                state: 'open',
              });
              if (result.data.length === 0) {
                core.warning(`No open PR found for branch ${branch}`);
                return;
              }
              prNumber = result.data[0].number;
            }

            core.info(`Applying pr-pull label to PR #${prNumber}`);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['pr-pull'],
            });
